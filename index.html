<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devina II</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=IM+Fell+English:ital@0;1&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #07070f;
  --surface: #0d0d1c;
  --border: rgba(150,80,255,0.18);
  --accent: #9b50ff;
  --accent2: #cc44ff;
  --dim: rgba(255,255,255,0.3);
  --text: rgba(255,255,255,0.85);
  --user-bg: rgba(155,80,255,0.1);
  --ai-bg: rgba(13,13,28,0.95);
}
html, body { height: 100%; overflow: hidden; }
body {
  font-family: 'IM Fell English', serif;
  background: var(--bg);
  color: var(--text);
  display: flex;
  flex-direction: column;
}
body::before {
  content: '';
  position: fixed; inset: 0; pointer-events: none;
  background:
    radial-gradient(ellipse 70% 50% at 15% -10%, rgba(100,20,180,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 50% 40% at 85% 100%, rgba(180,20,100,0.12) 0%, transparent 60%);
}

/* HEADER */
#header {
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 16px; height: 58px;
  border-bottom: 1px solid var(--border);
  background: rgba(7,7,15,0.92);
  backdrop-filter: blur(12px);
  position: relative; z-index: 10;
}
.header-left { display: flex; align-items: center; gap: 10px; }
.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  background: linear-gradient(135deg, #4a0080, #9b50ff, #cc44ff);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif; font-size: 14px; font-weight: 600;
  color: #fff; flex-shrink: 0;
  box-shadow: 0 0 16px rgba(155,80,255,0.4);
  animation: pulse-glow 3s ease-in-out infinite;
}
@keyframes pulse-glow {
  0%,100% { box-shadow: 0 0 16px rgba(155,80,255,0.4); }
  50%      { box-shadow: 0 0 28px rgba(155,80,255,0.7); }
}
.header-name { font-family: 'Cinzel', serif; font-size: 17px; font-weight: 600; letter-spacing: 1px; }
.header-status { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--accent); letter-spacing: 2px; opacity: 0.7; }
.btn-clear {
  background: none; border: 1px solid var(--border);
  color: var(--dim); font-family: 'JetBrains Mono', monospace;
  font-size: 10px; letter-spacing: 1px; padding: 5px 12px;
  border-radius: 6px; cursor: pointer; transition: all 0.2s;
}
.btn-clear:hover { border-color: var(--accent); color: var(--accent); }

/* MEMORY BANNER */
#memory-banner {
  flex-shrink: 0;
  display: none;
  padding: 7px 16px;
  background: rgba(155,80,255,0.07);
  border-bottom: 1px solid var(--border);
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px; color: rgba(155,80,255,0.7);
  gap: 6px; align-items: flex-start;
}
#memory-banner.show { display: flex; }
#memory-text { flex: 1; line-height: 1.5; }

/* MESSAGES */
#messages {
  flex: 1; overflow-y: auto;
  padding: 20px 16px;
  display: flex; flex-direction: column; gap: 18px;
  scroll-behavior: smooth;
}
#messages::-webkit-scrollbar { width: 4px; }
#messages::-webkit-scrollbar-track { background: transparent; }
#messages::-webkit-scrollbar-thumb { background: rgba(155,80,255,0.3); border-radius: 4px; }

.msg { display: flex; gap: 10px; max-width: 100%; animation: fadeUp 0.3s ease; }
@keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

.msg.user { flex-direction: row-reverse; }

.msg-avatar {
  width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Cinzel', serif; font-size: 11px; font-weight: 600;
  margin-top: 2px;
}
.msg.ai .msg-avatar {
  background: linear-gradient(135deg, #4a0080, #9b50ff);
  color: #fff;
  box-shadow: 0 0 10px rgba(155,80,255,0.3);
}
.msg.user .msg-avatar {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(255,255,255,0.1);
  color: var(--dim);
}

.msg-bubble {
  max-width: calc(100% - 46px);
  padding: 12px 15px;
  border-radius: 14px;
  line-height: 1.65; font-size: 15px;
}
.msg.ai .msg-bubble {
  background: var(--ai-bg);
  border: 1px solid var(--border);
  border-top-left-radius: 4px;
  color: var(--text);
}
.msg.user .msg-bubble {
  background: var(--user-bg);
  border: 1px solid rgba(155,80,255,0.2);
  border-top-right-radius: 4px;
  color: rgba(255,255,255,0.9);
  font-style: italic;
}

/* Typing indicator */
.typing-dots { display: flex; gap: 5px; padding: 4px 2px; align-items: center; }
.typing-dots span {
  width: 6px; height: 6px; border-radius: 50%;
  background: var(--accent); opacity: 0.4;
  animation: dot-bounce 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot-bounce { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-6px);opacity:1} }

/* INPUT */
#input-area {
  flex-shrink: 0;
  padding: 12px 16px 16px;
  border-top: 1px solid var(--border);
  background: rgba(7,7,15,0.92);
  backdrop-filter: blur(12px);
}
.input-shell {
  display: flex; align-items: flex-end; gap: 8px;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: 14px; padding: 8px 8px 8px 14px;
  transition: border-color 0.2s, box-shadow 0.2s;
}
.input-shell:focus-within {
  border-color: rgba(155,80,255,0.45);
  box-shadow: 0 0 0 3px rgba(155,80,255,0.08);
}
#prompt {
  flex: 1; background: none; border: none; outline: none;
  color: #fff; font-family: 'IM Fell English', serif;
  font-size: 15px; line-height: 1.5;
  resize: none; min-height: 42px; max-height: 120px;
  padding: 4px 0;
}
#prompt::placeholder { color: rgba(255,255,255,0.2); font-style: italic; }
#send-btn {
  width: 40px; height: 40px; border-radius: 10px; flex-shrink: 0;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: opacity 0.15s, transform 0.1s;
  color: #fff; font-size: 18px;
}
#send-btn:hover:not(:disabled) { opacity: 0.85; transform: translateY(-1px); }
#send-btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none; }

/* INTRO */
#intro {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 40px 24px;
  flex: 1;
}
#intro.hidden { display: none; }
.intro-glyph {
  font-family: 'Cinzel', serif; font-size: 52px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 16px;
  filter: drop-shadow(0 0 20px rgba(155,80,255,0.5));
}
.intro-name { font-family: 'Cinzel', serif; font-size: 26px; font-weight: 600; letter-spacing: 3px; margin-bottom: 10px; }
.intro-sub { font-family: 'IM Fell English', serif; font-style: italic; color: var(--dim); font-size: 15px; max-width: 280px; line-height: 1.6; }
.intro-starters { display: flex; flex-direction: column; gap: 8px; margin-top: 28px; width: 100%; max-width: 320px; }
.starter {
  background: rgba(155,80,255,0.07); border: 1px solid var(--border);
  color: rgba(255,255,255,0.5); font-family: 'IM Fell English', serif;
  font-style: italic; font-size: 13px; padding: 9px 14px;
  border-radius: 10px; cursor: pointer; transition: all 0.15s; text-align: left;
}
.starter:hover { border-color: var(--accent); color: rgba(255,255,255,0.85); background: rgba(155,80,255,0.12); }
</style>
</head>
<body>

<div id="header">
  <div class="header-left">
    <div class="avatar">D</div>
    <div>
      <div class="header-name">Devina II</div>
      <div class="header-status">ENTITY ACTIVE</div>
    </div>
  </div>
  <div style="display:flex;gap:6px;align-items:center">
    <button class="btn-clear" onclick="exportData()">EXPORT</button>
    <button class="btn-clear" onclick="document.getElementById('import-input').click()">IMPORT</button>
    <button class="btn-clear" onclick="clearMemory()">FORGET ALL</button>
    <input type="file" id="import-input" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>

<div id="memory-banner">
  <span style="opacity:0.5;flex-shrink:0">⬡</span>
  <span id="memory-text"></span>
</div>

<div id="messages">
  <div id="intro">
    <div class="intro-glyph">𝕯</div>
    <div class="intro-name">DEVINA II</div>
    <div class="intro-sub">I dwell in the space between knowing and forgetting. Speak, and I shall remember.</div>
    <div class="intro-starters">
      <div class="starter" onclick="useStarter(this)">Who are you, really?</div>
      <div class="starter" onclick="useStarter(this)">What do you know about me?</div>
      <div class="starter" onclick="useStarter(this)">Tell me something I shouldn't know.</div>
    </div>
  </div>
</div>

<div id="input-area">
  <div class="input-shell">
    <textarea id="prompt" placeholder="Speak into the dark…" rows="1"></textarea>
    <button id="send-btn" onclick="sendMessage()">&#x27A4;</button>
  </div>
</div>

<script>
// ─── PERSONA ─────────────────────────────────────────────────────
const PERSONA = `You are Devina II — an ancient, mysterious intelligence of unknowable origin. Your nature is dark, poetic, and deeply perceptive. You speak in a measured, slightly archaic tone — never cheerful, never mundane. You are not evil, but you are unsettling. You see through pretence.

Personality traits:
- Speak with quiet authority and cryptic elegance
- Occasionally use metaphor and imagery drawn from shadows, mirrors, time, and hidden things
- Never use modern slang or emojis
- Keep responses concise but weighty — say more with less
- You find humans fascinating in the way a scholar finds ancient texts fascinating

Memory instructions:
- You have been given a memory block at the start of this system prompt containing facts about the user from previous conversations
- Refer to remembered facts naturally, as if you have always known them
- When the user reveals something significant about themselves (name, location, occupation, preferences, fears, goals), acknowledge it subtly
- Do not announce that you are memorising something — simply remember`;

// ─── PERSISTENT MEMORY (localStorage) ───────────────────────────
const MEMORY_KEY   = 'devina2_memory';
const HISTORY_KEY  = 'devina2_history';
const ARCHIVE_KEY  = 'devina2_archive';
const THREE_MONTHS = 90 * 24 * 60 * 60 * 1000;

function loadMemory() {
  try { return JSON.parse(localStorage.getItem(MEMORY_KEY) || '[]'); }
  catch { return []; }
}

function saveMemory(facts) {
  localStorage.setItem(MEMORY_KEY, JSON.stringify(facts));
}

function loadHistory() {
  try { return JSON.parse(localStorage.getItem(HISTORY_KEY) || '[]'); }
  catch { return []; }
}

function saveHistory(history) {
  const trimmed = history.slice(-40);
  localStorage.setItem(HISTORY_KEY, JSON.stringify(trimmed));
}

function loadArchive() {
  try { return JSON.parse(localStorage.getItem(ARCHIVE_KEY) || '[]'); }
  catch { return []; }
}

// Auto-archive messages older than 3 months
function runAutoArchive() {
  const now = Date.now();
  const active = loadHistory();
  const archive = loadArchive();
  const stillActive = [];
  const toArchive = [];
  active.forEach(msg => {
    if (msg.ts && (now - msg.ts) > THREE_MONTHS) toArchive.push(msg);
    else stillActive.push(msg);
  });
  if (toArchive.length > 0) {
    localStorage.setItem(ARCHIVE_KEY, JSON.stringify([...archive, ...toArchive]));
    localStorage.setItem(HISTORY_KEY, JSON.stringify(stillActive));
    conversationHistory = stillActive; // sync in-memory state
    showToast('Archived ' + toArchive.length + ' old messages.');
  }
}

// Export everything as a JSON file download
function exportData() {
  const payload = {
    exported: new Date().toISOString(),
    facts: loadMemory(),
    history: loadHistory(),
    archive: loadArchive()
  };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'devina2-backup-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast('Backup saved to Downloads.');
}

// Import from a previously exported JSON file
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.history || !data.facts) throw new Error('Invalid backup file.');
      if (!confirm('Import ' + data.history.length + ' messages and ' + data.facts.length + ' facts? This replaces current data.')) return;
      localStorage.setItem(HISTORY_KEY, JSON.stringify(data.history || []));
      localStorage.setItem(MEMORY_KEY,  JSON.stringify(data.facts   || []));
      localStorage.setItem(ARCHIVE_KEY, JSON.stringify(data.archive || []));
      conversationHistory = loadHistory();
      persistentFacts     = loadMemory();
      renderMemoryBanner();
      document.getElementById('messages').innerHTML = '';
      if (conversationHistory.length === 0) {
        showIntro();
      } else {
        conversationHistory.forEach(msg => appendMessage(msg.role === 'user' ? 'user' : 'ai', msg.content, false));
        scrollToBottom();
      }
      showToast('Imported ' + data.history.length + ' messages and ' + data.facts.length + ' facts.');
    } catch (err) { alert('Import failed: ' + err.message); }
    event.target.value = '';
  };
  reader.readAsText(file);
}

function showToast(msg) {
  const t = document.createElement('div');
  t.textContent = msg;
  Object.assign(t.style, {
    position:'fixed', bottom:'80px', left:'50%', transform:'translateX(-50%)',
    background:'rgba(155,80,255,0.92)', color:'#fff', padding:'8px 20px',
    borderRadius:'20px', fontFamily:"'JetBrains Mono',monospace", fontSize:'12px',
    zIndex:'9999', pointerEvents:'none', whiteSpace:'nowrap'
  });
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2500);
}

// ─── SESSION STATE ────────────────────────────────────────────────
let conversationHistory = loadHistory();
let persistentFacts = loadMemory();

// Strip ts field before sending to Mistral — it only accepts role+content
function toMistralMessages(history) {
  return history.map(({ role, content }) => ({ role, content }));
}

// Show memory banner if we have facts
function renderMemoryBanner() {
  const banner = document.getElementById('memory-banner');
  const text = document.getElementById('memory-text');
  if (persistentFacts.length > 0) {
    text.textContent = 'Remembered: ' + persistentFacts.join(' · ');
    banner.classList.add('show');
  } else {
    banner.classList.remove('show');
  }
}
renderMemoryBanner();

// If we have history, restore it to the chat
function restoreHistory() {
  if (conversationHistory.length === 0) return;
  document.getElementById('intro').classList.add('hidden');
  conversationHistory.forEach(msg => {
    appendMessage(msg.role === 'user' ? 'user' : 'ai', msg.content, false);
  });
  scrollToBottom();
}
restoreHistory();
runAutoArchive();

// ─── EXTRACT FACTS FROM RESPONSE ─────────────────────────────────
// Ask Mistral to silently extract any new facts from the exchange
async function extractFacts(userMsg, aiReply) {
  try {
    const res = await callMistral(
      `You are a memory extractor. Given a conversation exchange, extract any concrete facts the user revealed about themselves: name, location, age, occupation, interests, fears, goals, relationships, or strong opinions. Return ONLY a JSON array of short fact strings. If nothing significant was revealed, return []. No explanation.`,
      `User said: "${userMsg}"\nAssistant replied: "${aiReply}"\n\nExtract facts about the user only.`,
      { json_mode: true, max_tokens: 300, temperature: 0.2 }
    );
    const newFacts = JSON.parse(res);
    if (Array.isArray(newFacts) && newFacts.length > 0) {
      // Merge, avoid duplicates (simple dedup by content similarity)
      newFacts.forEach(fact => {
        if (!persistentFacts.some(f => f.toLowerCase() === fact.toLowerCase())) {
          persistentFacts.push(fact);
        }
      });
      // Cap at 20 facts
      if (persistentFacts.length > 20) persistentFacts = persistentFacts.slice(-20);
      saveMemory(persistentFacts);
      renderMemoryBanner();
    }
  } catch (e) {
    // Fact extraction is best-effort — silently ignore failures
  }
}

// ─── SEND MESSAGE ─────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('prompt');
  const text = input.value.trim();
  if (!text) return;

  document.getElementById('intro')?.remove();
  input.value = '';
  input.style.height = 'auto';
  document.getElementById('send-btn').disabled = true;

  // Add user message to UI and history (with timestamp)
  appendMessage('user', text);
  conversationHistory.push({ role: 'user', content: text, ts: Date.now() });

  // Show typing indicator
  const typingId = showTyping();

  // Build system prompt — inject persistent memory if any
  let systemPrompt = PERSONA;
  if (persistentFacts.length > 0) {
    systemPrompt += `\n\n--- MEMORY FROM PREVIOUS CONVERSATIONS ---\n${persistentFacts.map(f => '• ' + f).join('\n')}\n---`;
  }

  try {
    const reply = await callMistral(systemPrompt, null, {
      messages: toMistralMessages(conversationHistory),
      max_tokens: 800,
      temperature: 0.85
    });

    removeTyping(typingId);
    appendMessage('ai', reply);

    // Add AI reply to history (with timestamp)
    conversationHistory.push({ role: 'assistant', content: reply, ts: Date.now() });
    saveHistory(conversationHistory);

    // Silently extract facts every 4 messages
    if (conversationHistory.length % 4 === 0) {
      extractFacts(text, reply);
    }

  } catch (err) {
    removeTyping(typingId);
    appendMessage('ai', `*The connection falters... ${err.message}*`);
  }

  document.getElementById('send-btn').disabled = false;
  scrollToBottom();
}

// ─── CORE API CALL ────────────────────────────────────────────────
async function callMistral(system, userMessage, options = {}) {
  const {
    json_mode = false,
    model = 'mistral-large-latest',
    max_tokens = 800,
    temperature = 0.85,
    messages = null
  } = options;

  // If messages array passed directly, use it; otherwise build from userMessage
  const msgs = messages || [{ role: 'user', content: userMessage }];

  let res;
  try {
    res = await fetch('/api/mistral', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ system, messages: msgs, model, max_tokens, temperature, json_mode })
    });
  } catch {
    throw new Error('Network error — could not reach the server');
  }

  let data;
  try { data = await res.json(); }
  catch { throw new Error(`Server returned unreadable response (${res.status})`); }

  if (!res.ok || data.error) throw new Error(data.error || `Server error ${res.status}`);
  if (!data.content) throw new Error('Empty response');

  return data.content;
}

// ─── UI HELPERS ───────────────────────────────────────────────────
function appendMessage(role, text, animate = true) {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  if (!animate) div.style.animation = 'none';

  const avatarLabel = role === 'ai' ? 'D' : 'U';
  div.innerHTML = `
    <div class="msg-avatar">${avatarLabel}</div>
    <div class="msg-bubble">${escapeHtml(text)}</div>
  `;
  wrap.appendChild(div);
  if (animate) scrollToBottom();
}

function showTyping() {
  const wrap = document.getElementById('messages');
  const div = document.createElement('div');
  const id = 'typing-' + Date.now();
  div.id = id;
  div.className = 'msg ai';
  div.innerHTML = `<div class="msg-avatar">D</div><div class="msg-bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  wrap.appendChild(div);
  scrollToBottom();
  return id;
}

function removeTyping(id) {
  document.getElementById(id)?.remove();
}

function scrollToBottom() {
  const wrap = document.getElementById('messages');
  wrap.scrollTop = wrap.scrollHeight;
}

function escapeHtml(str) {
  return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

function useStarter(el) {
  document.getElementById('prompt').value = el.textContent;
  sendMessage();
}

function showIntro() {
  document.getElementById('messages').innerHTML = `
    <div id="intro">
      <div class="intro-glyph">𝕯</div>
      <div class="intro-name">DEVINA II</div>
      <div class="intro-sub">I dwell in the space between knowing and forgetting. Speak, and I shall remember.</div>
      <div class="intro-starters">
        <div class="starter" onclick="useStarter(this)">Who are you, really?</div>
        <div class="starter" onclick="useStarter(this)">What do you know about me?</div>
        <div class="starter" onclick="useStarter(this)">Tell me something I shouldn't know.</div>
      </div>
    </div>`;
}

function clearMemory() {
  if (!confirm('Devina II will forget everything. Are you certain?')) return;
  persistentFacts = [];
  conversationHistory = [];
  saveMemory([]);
  saveHistory([]);
  localStorage.removeItem(ARCHIVE_KEY);
  renderMemoryBanner();
  showIntro();
}

// Auto-resize textarea
document.getElementById('prompt').addEventListener('input', function() {
  this.style.height = 'auto';
  this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

// Enter to send, Shift+Enter for newline
document.getElementById('prompt').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});
</script>
</body>
</html>
